name: Mall CI Test Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ================================================================
  #  Job 1: 构建 + 静态分析 + 单元测试
  # ================================================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # 先将本地 SNAPSHOT 模块安装到 ~/.m2，后续步骤可直接引用
      - name: Install local modules
        run: mvn install -DskipTests -Ddocker.skip=true -q
        working-directory: mall

      # --- 静态分析 ---
      - name: SpotBugs scan
        run: mvn spotbugs:spotbugs -pl mall-security,mall-admin,mall-portal -DskipTests
        working-directory: mall

      - name: PMD scan
        run: mvn pmd:pmd -pl mall-security,mall-admin,mall-portal -DskipTests
        working-directory: mall

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            mall/mall-security/target/spotbugsXml.xml
            mall/mall-admin/target/spotbugsXml.xml
            mall/mall-portal/target/spotbugsXml.xml
            mall/mall-security/target/pmd.xml
            mall/mall-admin/target/pmd.xml
            mall/mall-portal/target/pmd.xml

      # --- 单元测试 ---
      - name: Run unit tests (mall-security)
        run: mvn test -pl mall-security -DskipTests=false -DfailIfNoTests=false
        working-directory: mall

      - name: Run unit tests (mall-admin)
        run: mvn test -pl mall-admin -DskipTests=false -DfailIfNoTests=false
        working-directory: mall

      - name: Run unit tests (mall-portal)
        run: mvn test -pl mall-portal -DskipTests=false -DfailIfNoTests=false
        working-directory: mall

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            mall/mall-security/target/surefire-reports/
            mall/mall-admin/target/surefire-reports/
            mall/mall-portal/target/surefire-reports/

  # ================================================================
  #  Job 2: 集成测试 (需要 MySQL + Redis Docker 服务)
  # ================================================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Install local modules
        run: mvn install -DskipTests -Ddocker.skip=true -q
        working-directory: mall

      - name: Create database and import schema
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS mall DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -h 127.0.0.1 -u root -proot mall < mall/document/sql/mall.sql

      - name: Run DAO integration tests
        run: mvn test -pl mall-admin -DskipTests=false -Dtest="com.macro.mall.dao.*Test" -DfailIfNoTests=false
        working-directory: mall

      - name: Run Service integration tests
        run: mvn test -pl mall-admin -DskipTests=false -Dtest="com.macro.mall.service.UmsAdminServiceTest" -DfailIfNoTests=false
        working-directory: mall

      - name: Run Controller integration tests
        run: mvn test -pl mall-admin -DskipTests=false -Dtest="com.macro.mall.controller.AdminControllerTest" -DfailIfNoTests=false
        working-directory: mall

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: mall/mall-admin/target/surefire-reports/
